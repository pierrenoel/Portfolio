<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeForge - 404 System Error</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/img/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/img/site.webmanifest" />
    <link href="assets/css/app.css" type="text/css" rel="stylesheet" />
    <link href="assets/css/error.css" type="text/css" rel="stylesheet" />
  </head>
  <body>
    <div
      class="squares"
      style="position: absolute; top: 0; left: 0; z-index: 0"
    ></div>

    <main class="error-page container">
      <div class="glitch-box">Error: Route_Not_Found</div>

      <h1 class="error-code">40<span>4</span></h1>

      <div class="error-message">
        <h2 class="hero-h1" style="font-size: 2rem; margin-bottom: 1rem">
          Endpoint unreachable.
        </h2>
        <p class="hero-p" style="margin: 0 auto 3rem auto">
          The system could not resolve the requested path. It might have been
          moved, deleted, or never existed in this architecture.
        </p>
      </div>

      <div class="contact-actions">
        <a href="index.html" class="btn-primary">Return to Home</a>
      </div>
    </main>
    
  </body>
</html>
