<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - System Error | CodeForge</title>
    <link href="assets/css/app.css" type="text/css" rel="stylesheet" />
    <style>
      /* Styles spécifiques pour centrer le contenu de la 404 */
      .error-page {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .error-code {
        font-family: var(--title-font);
        font-size: clamp(5rem, 15vw, 12rem);
        font-weight: 800;
        line-height: 1;
        color: var(--text);
        margin: 0;
        position: relative;
        z-index: 1;
      }

      .error-code span {
        color: var(--accent);
      }

      .error-message {
        margin-top: -1rem;
        z-index: 1;
      }

      .glitch-box {
        background: var(--accent-glow);
        border: 1px solid var(--accent);
        padding: 0.5rem 1rem;
        font-family: var(--title-font);
        font-size: 0.8rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div
      class="squares"
      style="position: absolute; top: 0; left: 0; z-index: 0"
    ></div>

    <main class="error-page container">
      <div class="glitch-box">Error: Route_Not_Found</div>

      <h1 class="error-code">40<span>4</span></h1>

      <div class="error-message">
        <h2 class="hero-h1" style="font-size: 2rem; margin-bottom: 1rem">
          Endpoint unreachable.
        </h2>
        <p class="hero-p" style="margin: 0 auto 3rem auto">
          The system could not resolve the requested path. It might have been
          moved, deleted, or never existed in this architecture.
        </p>
      </div>

      <div class="contact-actions">
        <a href="index.html" class="btn-primary">Return to Dashboard</a>
      </div>
    </main>

    <script type="text/javascript" src="assets/js/app.js"></script>
  </body>
</html>
